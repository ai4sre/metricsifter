name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  validate-and-build:
    name: Validate and build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install development dependencies
        run: uv sync --locked --extra dev --python 3.11

      - name: Test
        run: uv run --python 3.11 pytest -s -vv tests

      - name: Lint
        run: uv run --python 3.11 ruff check .

      - name: Check formatting
        run: uv run --python 3.11 black --check .

      - name: Verify lock file
        run: uv lock --check

      - name: Verify tag matches the project version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PROJECT_VERSION="$(uv run --python 3.11 python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          test "$TAG_VERSION" = "$PROJECT_VERSION"

      - name: Build package
        run: uv build

      - name: Install and smoke test wheel outside the source checkout
        run: |
          WHEEL_PATH="$(find "$GITHUB_WORKSPACE/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$WHEEL_PATH"
          SMOKE_DIR="$(mktemp -d)"
          uv venv --python 3.11 "$SMOKE_DIR/.venv"
          uv pip install --python "$SMOKE_DIR/.venv/bin/python" "$WHEEL_PATH"
          cd "$SMOKE_DIR"
          "$SMOKE_DIR/.venv/bin/python" -c "import metricsifter; print(metricsifter.__version__)"
          "$SMOKE_DIR/.venv/bin/metricsifter" --help

      - name: Store the validated distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI
    needs: validate-and-build
    runs-on: ubuntu-latest
    environment:
      name: metricsifter_pypi
      url: https://pypi.org/p/metricsifter
    permissions:
      id-token: write

    steps:
      - name: Download the validated distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
